<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能图书馆 - 高级版</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            padding: 30px 0;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 18px;
            opacity: 0.9;
        }

        .main-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .upload-section {
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #e4e7ed;
        }

        .upload-area {
            border: 2px dashed #dcdfe6;
            border-radius: 8px;
            padding: 25px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
        }

        .upload-area:hover {
            border-color: #409EFF;
            background-color: #ecf5ff;
        }

        .file-info-bar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-radius: 8px;
            margin-top: 15px;
        }

        .chat-section {
            display: flex;
            flex-direction: column;
            height: 600px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background-color: #f5f7fa;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            align-items: flex-start;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .ai-avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .user-avatar {
            background: #f0f0f0;
        }

        .message-content {
            max-width: 70%;
            padding: 14px 18px;
            border-radius: 12px;
            line-height: 1.6;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .message-content {
            max-width: 70%;
            padding: 14px 18px;
            border-radius: 12px;
            line-height: 1.6;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .message.ai .message-content {
            background-color: white;
            border: 1px solid #e4e7ed;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        /* Markdown 表格样式 */
        .message-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
            overflow: hidden;
            border-radius: 8px;
        }

        .message-content th,
        .message-content td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e4e7ed;
        }

        .message-content th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: bold;
        }

        .message-content tr:hover {
            background-color: #f5f7fa;
        }

        .message-content p {
            margin: 8px 0;
        }

        .message-content pre {
            background-color: #f6f8fa;
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 8px 0;
        }

        .message-content code {
            background-color: #f6f8fa;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
        }

        .message-content pre code {
            background-color: transparent;
            padding: 0;
        }

        .message-content ul,
        .message-content ol {
            padding-left: 20px;
            margin: 8px 0;
        }

        .message-content li {
            margin: 4px 0;
        }

        .input-section {
            padding: 20px;
            background: white;
            border-top: 1px solid #e4e7ed;
        }

        .quick-questions {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .typing-indicator {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #909399;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .service-features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .feature-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .feature-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .feature-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="container">
            <div class="header">
                <h1>📚 智能图书馆</h1>
                <p>AI 驱动的智能阅读与图书服务助手</p>
            </div>

            <div class="main-card">
                <el-tabs v-model="activeTab" type="border-card">
                    <!-- 阅读助手 -->
                    <el-tab-pane label="📖 阅读助手" name="reading">
                        <div class="upload-section">
                            <div class="upload-area" @click="triggerUpload" 
                                 @dragover.prevent @drop.prevent="handleDrop">
                                <el-icon :size="48" color="#409EFF"><UploadFilled /></el-icon>
                                <p style="margin-top: 10px; color: #909399;">
                                    点击或拖拽上传 PDF 文件（最大 30MB）
                                </p>
                                <input 
                                    type="file" 
                                    ref="fileInput" 
                                    accept=".pdf" 
                                    style="display: none"
                                    @change="handleFileChange"
                                >
                            </div>
                            
                            <!-- 上传进度条 -->
                            <div v-if="isUploading" style="padding: 20px;">
                                <el-progress 
                                    :percentage="uploadProgress" 
                                    :stroke-width="8"
                                    :text-inside="true"
                                    :duration="200"
                                    status="active"
                                    color="#409EFF"
                                >
                                </el-progress>
                                <p style="text-align: center; margin-top: 10px; color: #909399; font-size: 13px;">
                                    <span style="display: inline-block; animation: spin 1s linear infinite; margin-right: 5px;">🔄</span>
                                    正在上传和解析中... {{ uploadProgress }}%
                                </p>
                                <p style="text-align: center; color: #909399; font-size: 12px; margin-top: 5px;">
                                    文件较大时可能需要一些时间，请耐心等待...
                                </p>
                            </div>
                            
                            <div v-if="currentFile && !isUploading" class="file-info-bar">
                                <div>
                                    <el-icon><Document /></el-icon>
                                    <strong>{{ currentFile.name }}</strong>
                                    <span style="margin-left: 10px; opacity: 0.8;">
                                        ({{ formatFileSize(currentFile.size) }})
                                    </span>
                                </div>
                                <el-button type="danger" size="small" @click="removeFile">
                                    <el-icon><Delete /></el-icon> 移除文件
                                </el-button>
                            </div>
                        </div>

                        <div class="chat-section">
                            <div class="chat-messages" ref="chatMessages">
                                <div v-for="(msg, index) in readingMessages" :key="index" 
                                     :class="['message', msg.type]">
                                    <div v-if="msg.type === 'ai'" class="message-avatar ai-avatar">
                                        🤖
                                    </div>
                                    <div class="message-content">
                                        <div v-if="msg.typing" class="typing-indicator">
                                            <span class="typing-dot"></span>
                                            <span class="typing-dot"></span>
                                            <span class="typing-dot"></span>
                                        </div>
                                        <div v-else v-html="renderMarkdown(msg.content)"></div>
                                    </div>
                                    <div v-if="msg.type === 'user'" class="message-avatar user-avatar">
                                        👤
                                    </div>
                                </div>
                            </div>

                            <div class="input-section">
                                <el-input
                                    v-model="readingInput"
                                    placeholder="请输入关于 PDF 内容的问题..."
                                    @keyup.enter="sendReadingMessage"
                                    :disabled="!currentFile || readingLoading"
                                    clearable
                                    size="large"
                                >
                                    <template #append>
                                        <el-button @click="sendReadingMessage" 
                                                   :disabled="!currentFile || readingLoading"
                                                   type="primary"
                                                   size="large">
                                            <el-icon><ChatDotRound /></el-icon> 发送
                                        </el-button>
                                    </template>
                                </el-input>
                            </div>
                        </div>
                    </el-tab-pane>

                    <!-- 图书预约助手 -->
                    <el-tab-pane label="📋 图书预约助手" name="reservation">
                        <div style="padding: 20px;">
                            <div class="service-features">
                                <div class="feature-item" @click="quickQuestion('如何预约图书？')">
                                    <div class="feature-icon">📝</div>
                                    <h3>预约流程</h3>
                                    <p>了解如何预约心仪的图书</p>
                                </div>
                                <div class="feature-item" @click="quickQuestion('预约后多久可以取书？')">
                                    <div class="feature-icon">⏰</div>
                                    <h3>取书时间</h3>
                                    <p>查询预约图书的取书时间</p>
                                </div>
                                <div class="feature-item" @click="quickQuestion('可以预约多少本书？')">
                                    <div class="feature-icon">📚</div>
                                    <h3>预约限制</h3>
                                    <p>了解预约数量规定</p>
                                </div>
                                <div class="feature-item" @click="quickQuestion('如何取消预约？')">
                                    <div class="feature-icon">❌</div>
                                    <h3>取消预约</h3>
                                    <p>学习如何取消已有预约</p>
                                </div>
                            </div>

                            <div class="chat-section">
                                <div class="chat-messages" ref="reservationChat">
                                    <div v-for="(msg, index) in reservationMessages" :key="index" 
                                         :class="['message', msg.type]">
                                        <div v-if="msg.type === 'ai'" class="message-avatar ai-avatar">
                                            🤖
                                        </div>
                                        <div class="message-content">
                                            <div v-if="msg.typing" class="typing-indicator">
                                                <span class="typing-dot"></span>
                                                <span class="typing-dot"></span>
                                                <span class="typing-dot"></span>
                                            </div>
                                            <div v-else v-html="renderMarkdown(msg.content)"></div>
                                        </div>
                                        <div v-if="msg.type === 'user'" class="message-avatar user-avatar">
                                            👤
                                        </div>
                                    </div>
                                </div>

                                <div class="input-section">
                                    <el-input
                                        v-model="reservationInput"
                                        placeholder="请输入关于图书预约的问题..."
                                        @keyup.enter="sendReservationMessage"
                                        :disabled="reservationLoading"
                                        clearable
                                        size="large"
                                    >
                                        <template #append>
                                            <el-button @click="sendReservationMessage" 
                                                       :disabled="reservationLoading"
                                                       type="primary"
                                                       size="large">
                                                <el-icon><ChatDotRound /></el-icon> 发送
                                            </el-button>
                                        </template>
                                    </el-input>
                                </div>
                            </div>
                        </div>
                    </el-tab-pane>
                </el-tabs>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, nextTick } = Vue;

        createApp({
            setup() {
                const activeTab = ref('reading');
                const readingInput = ref('');
                const reservationInput = ref('');
                const readingMessages = ref([
                    { type: 'ai', content: '您好！我是您的智能阅读助手。请上传 PDF 文件，然后我可以帮您分析文档内容、解答疑问。', typing: false }
                ]);
                const reservationMessages = ref([
                    { type: 'ai', content: '您好！我是图书预约助手。我可以帮您了解图书预约流程、查询预约状态等。请问有什么可以帮您？', typing: false }
                ]);
                const readingLoading = ref(false);
                const reservationLoading = ref(false);
                const uploadProgress = ref(0);
                const isUploading = ref(false);
                const currentFile = ref(null);
                const chatId = ref('chat_' + Date.now());
                const fileInput = ref(null);

                const formatFileSize = (bytes) => {
                    if (bytes < 1024) return bytes + ' B';
                    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
                    return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
                };

                // Markdown 渲染函数
                const renderMarkdown = (text) => {
                    if (!text) return '';
                    try {
                        return marked.parse(text);
                    } catch (error) {
                        console.error('Markdown 解析失败:', error);
                        return text;
                    }
                };

                const triggerUpload = () => {
                    fileInput.value.click();
                };

                const handleFileChange = (event) => {
                    const file = event.target.files[0];
                    if (file) {
                        uploadFile(file);
                    }
                };

                const handleDrop = (event) => {
                    const file = event.dataTransfer.files[0];
                    if (file && file.type === 'application/pdf') {
                        uploadFile(file);
                    } else {
                        ElementPlus.ElMessage.error('只能上传 PDF 文件！');
                    }
                };

                const uploadFile = async (file) => {
                    if (file.size > 30 * 1024 * 1024) {
                        ElementPlus.ElMessage.error('文件大小不能超过 30MB！');
                        return;
                    }

                    // 设置上传状态
                    isUploading.value = true;
                    uploadProgress.value = 0;

                    const formData = new FormData();
                    formData.append('file', file);

                    try {
                        // 模拟进度更新（因为实际上传是异步的）
                        const progressInterval = setInterval(() => {
                            if (uploadProgress.value < 90) {
                                uploadProgress.value += Math.random() * 15;
                                if (uploadProgress.value > 90) {
                                    uploadProgress.value = 90;
                                }
                            }
                        }, 300);

                        const response = await fetch(`/ai/pdf/upload/${chatId.value}`, {
                            method: 'POST',
                            body: formData
                        });

                        clearInterval(progressInterval);
                        uploadProgress.value = 100;

                        const result = await response.json();
                        
                        // 等待进度条完成动画
                        await new Promise(resolve => setTimeout(resolve, 500));
                        
                        // 修改判断条件：兼容多种响应格式
                        if (result.code === 200 || result.ok === 1 || result.success === true) {
                            currentFile.value = file;
                            isUploading.value = false;
                            readingMessages.value.push({
                                type: 'ai',
                                content: `文件《${file.name}》上传成功！您现在可以开始提问了。`,
                                typing: false
                            });
                            ElementPlus.ElMessage.success('文件上传成功');
                            scrollToBottom('.reading-chat');
                        } else {
                            isUploading.value = false;
                            ElementPlus.ElMessage.error(result.message || result.msg || '上传失败');
                        }
                    } catch (error) {
                        console.error('上传失败:', error);
                        isUploading.value = false;
                        ElementPlus.ElMessage.error('上传失败，请重试');
                    }
                };

                const removeFile = () => {
                    currentFile.value = null;
                    chatId.value = 'chat_' + Date.now();
                    readingMessages.value = [
                        { type: 'ai', content: '文件已移除，请重新上传新的 PDF 文件。', typing: false }
                    ];
                };

                const scrollToBottom = (selector) => {
                    nextTick(() => {
                        const container = document.querySelector(selector);
                        if (container) {
                            container.scrollTop = container.scrollHeight;
                        }
                    });
                };

                const addTypingMessage = (type) => {
                    const messages = type === 'reading' ? readingMessages.value : reservationMessages.value;
                    messages.push({
                        type: 'ai',
                        content: '',
                        typing: true
                    });
                    scrollToBottom(type === 'reading' ? '.chat-messages' : '.reservation-chat');
                };

                const removeTypingMessage = (type) => {
                    const messages = type === 'reading' ? readingMessages.value : reservationMessages.value;
                    const lastMsg = messages[messages.length - 1];
                    if (lastMsg && lastMsg.typing) {
                        messages.pop();
                    }
                };

                const sendReadingMessage = async () => {
                    if (!readingInput.value.trim() || !currentFile.value) return;

                    const question = readingInput.value;
                    readingMessages.value.push({ type: 'user', content: question, typing: false });
                    readingLoading.value = true;
                    readingInput.value = '';
                    
                    addTypingMessage('reading');

                    try {
                        const response = await fetch(
                            `/ai/pdf/chat?prompt=${encodeURIComponent(question)}&chatId=${chatId.value}`
                        );
                        const answer = await response.text();
                        
                        removeTypingMessage('reading');
                        readingMessages.value.push({ type: 'ai', content: answer, typing: false });
                    } catch (error) {
                        console.error('提问失败:', error);
                        removeTypingMessage('reading');
                        readingMessages.value.push({ 
                            type: 'ai', 
                            content: '抱歉，处理您的问题失败，请重试。',
                            typing: false
                        });
                    } finally {
                        readingLoading.value = false;
                        scrollToBottom('.chat-messages');
                    }
                };

                const sendReservationMessage = async () => {
                    if (!reservationInput.value.trim()) return;

                    const question = reservationInput.value;
                    reservationMessages.value.push({ type: 'user', content: question, typing: false });
                    reservationLoading.value = true;
                    reservationInput.value = '';
                    
                    addTypingMessage('reservation');

                    try {
                        const response = await fetch(
                            `/ai/service?prompt=${encodeURIComponent(question)}&chatId=${chatId.value}`
                        );
                        const answer = await response.text();
                        
                        removeTypingMessage('reservation');
                        reservationMessages.value.push({ type: 'ai', content: answer, typing: false });
                    } catch (error) {
                        console.error('提问失败:', error);
                        removeTypingMessage('reservation');
                        reservationMessages.value.push({ 
                            type: 'ai', 
                            content: '抱歉，处理您的问题失败，请重试。',
                            typing: false
                        });
                    } finally {
                        reservationLoading.value = false;
                        scrollToBottom('.reservation-chat');
                    }
                };

                const quickQuestion = (question) => {
                    reservationInput.value = question;
                    sendReservationMessage();
                };

                return {
                    activeTab,
                    readingInput,
                    reservationInput,
                    readingMessages,
                    reservationMessages,
                    readingLoading,
                    reservationLoading,
                    currentFile,
                    fileInput,
                    formatFileSize,
                    renderMarkdown,
                    triggerUpload,
                    handleFileChange,
                    handleDrop,
                    removeFile,
                    sendReadingMessage,
                    sendReservationMessage,
                    quickQuestion
                };
            }
        }).use(ElementPlus).mount('#app');
    </script>
</body>
</html>
