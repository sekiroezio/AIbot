<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GraphRAG - 知识图谱阅读助手</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f7f7f8;
            --bg-sidebar: #1a1a2e;
            --bg-sidebar-hover: #16213e;
            --bg-sidebar-active: #0f3460;
            --border: #e5e5e5;
            --text-primary: #1a1a1a;
            --text-secondary: #6b6b6b;
            --text-muted: #999999;
            --text-sidebar: #e0e0e0;
            --text-sidebar-muted: #8899aa;
            --accent: #10a37f;
            --accent-hover: #0d8c6d;
            --user-bubble: #f7f7f8;
            --shadow: 0 2px 6px rgba(0,0,0,0.06);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif; background: var(--bg-primary); height: 100vh; overflow: hidden; color: var(--text-primary); }

        .app-layout { display: grid; grid-template-columns: 1fr 1fr; height: 100vh; }

        .left-panel { display: flex; flex-direction: column; border-right: 1px solid var(--border); background: var(--bg-primary); min-height: 0; overflow: hidden; }
        .right-panel { display: flex; flex-direction: column; background: var(--bg-primary); min-height: 0; overflow: hidden; }

        .panel-header {
            padding: 14px 24px; background: var(--bg-primary);
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            font-size: 14px; min-height: 52px;
        }
        .panel-header h3 { font-size: 15px; font-weight: 600; color: var(--text-primary); }

        .graph-section { flex: 1; min-height: 0; position: relative; background: var(--bg-secondary); overflow: hidden; }
        #graph-chart { width: 100%; height: 100%; }

        .upload-placeholder {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; padding: 40px; text-align: center; color: var(--text-secondary);
        }
        .upload-icon { font-size: 56px; margin-bottom: 20px; opacity: 0.3; }
        .upload-area {
            border: 2px dashed var(--border); border-radius: 12px; padding: 32px 48px;
            text-align: center; transition: all 0.3s; cursor: pointer; margin-top: 20px;
        }
        .upload-area:hover { border-color: var(--accent); background-color: rgba(16,163,127,0.04); }

        .uploading-spinner { font-size: 40px; animation: spin 1s linear infinite; margin-bottom: 16px; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .uploading-steps { margin-top: 20px; text-align: left; }
        .uploading-steps div { padding: 6px 0; color: var(--text-muted); font-size: 13px; }
        .uploading-steps div.active { color: var(--accent); font-weight: 500; }
        .uploading-steps div.done { color: var(--accent); }

        /* 右侧面板 - 对话区 */
        .chat-area { flex: 1; display: flex; flex-direction: column; min-height: 0; }

        .chat-messages { flex: 1; overflow-y: auto; padding: 24px; background: var(--bg-primary); }
        .chat-messages::-webkit-scrollbar { width: 6px; }
        .chat-messages::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }

        .message { margin-bottom: 20px; animation: fadeIn 0.25s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .message.user { display: flex; justify-content: flex-end; }
        .message.ai { display: flex; justify-content: flex-start; }

        .message-content {
            max-width: 75%; padding: 12px 16px; border-radius: 16px; line-height: 1.7;
            font-size: 14px; word-wrap: break-word; overflow-wrap: break-word;
        }
        .message.ai .message-content { background: var(--user-bubble); color: var(--text-primary); }
        .message.user .message-content { background: var(--accent); color: white; border-bottom-right-radius: 4px; }

        .message-content table { width: 100%; border-collapse: collapse; margin: 8px 0; }
        .message-content th, .message-content td { padding: 6px 10px; text-align: left; border-bottom: 1px solid var(--border); font-size: 13px; }
        .message-content th { background: var(--bg-secondary); }
        .message-content pre { background: var(--bg-secondary); padding: 12px; border-radius: 8px; overflow-x: auto; font-size: 13px; }
        .message-content code { background: var(--bg-secondary); padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 13px; }
        .message-content pre code { background: transparent; padding: 0; }
        .message-content p { margin: 4px 0; }

        .streaming-text { color: var(--text-secondary); white-space: pre-wrap; word-break: break-all; }

        .loading { text-align: center; padding: 16px; color: var(--text-muted); }
        .loading-dots { display: inline-flex; gap: 4px; }
        .loading-dots span { width: 6px; height: 6px; background: var(--text-muted); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        .stat-badge {
            display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px;
            background: var(--bg-secondary); border-radius: 12px; font-size: 12px; color: var(--text-secondary);
        }

        /* 输入区域 */
        .input-area { padding: 16px 24px 24px; background: var(--bg-primary); flex-shrink: 0; }
        .input-wrapper {
            display: flex; align-items: center; background: var(--bg-primary);
            border: 1px solid var(--border); border-radius: 12px; overflow: hidden;
            box-shadow: var(--shadow); transition: border-color 0.2s;
        }
        .input-wrapper:focus-within { border-color: var(--accent); }
        .input-wrapper input {
            flex: 1; border: none; outline: none; padding: 14px 16px; font-size: 14px;
            background: transparent; color: var(--text-primary);
        }
        .input-wrapper input::placeholder { color: var(--text-muted); }
        .input-wrapper input:disabled { opacity: 0.5; }
        .send-btn {
            padding: 8px 16px; margin: 4px; border: none; border-radius: 8px;
            background: var(--accent); color: white; font-size: 14px; cursor: pointer;
            transition: background 0.2s; font-weight: 500;
        }
        .send-btn:hover { background: var(--accent-hover); }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* 侧边栏（与book.html风格一致） */
        .sidebar {
            width: 260px; min-width: 260px; background: var(--bg-sidebar);
            display: flex; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.06);
        }
        .sidebar-header {
            padding: 16px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .sidebar-header h3 { color: #fff; font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .new-chat-btn {
            background: var(--accent); color: #fff; border: none; border-radius: 8px;
            padding: 6px 12px; font-size: 13px; cursor: pointer; transition: background 0.2s;
            display: flex; align-items: center; gap: 4px;
        }
        .new-chat-btn:hover { background: var(--accent-hover); }

        .sidebar-list { flex: 1; overflow-y: auto; padding: 8px; }
        .sidebar-list::-webkit-scrollbar { width: 4px; }
        .sidebar-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

        .chat-item {
            padding: 10px 12px; border-radius: 8px; cursor: pointer;
            color: var(--text-sidebar); font-size: 13px; margin-bottom: 2px;
            display: flex; align-items: center; justify-content: space-between;
            transition: all 0.15s; position: relative;
        }
        .chat-item:hover { background: var(--bg-sidebar-hover); }
        .chat-item.active { background: var(--bg-sidebar-active); color: #fff; font-weight: 500; }
        .chat-item-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .chat-item-delete {
            opacity: 0; background: none; border: none; color: var(--text-sidebar-muted);
            cursor: pointer; font-size: 14px; padding: 2px 4px; border-radius: 4px; transition: all 0.15s;
        }
        .chat-item:hover .chat-item-delete { opacity: 1; }
        .chat-item-delete:hover { color: #ef4444; background: rgba(239,68,68,0.15); }

        .sidebar-footer { padding: 12px 16px; border-top: 1px solid rgba(255,255,255,0.08); }
        .sidebar-footer a { color: var(--text-sidebar-muted); text-decoration: none; font-size: 12px; transition: color 0.2s; }
        .sidebar-footer a:hover { color: var(--accent); }

        /* 全局布局：左侧边栏 + 主区域 */
        .app-container { display: flex; height: 100vh; }
        .main-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }

        .app-header {
            padding: 14px 24px; background: var(--bg-primary);
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; min-height: 52px;
        }
        .app-header h3 { font-size: 15px; font-weight: 600; }

        .sidebar-toggle {
            display: none; background: none; border: none; font-size: 20px; cursor: pointer;
            color: var(--text-primary); padding: 4px 8px;
        }
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -280px; top: 0; bottom: 0; z-index: 100; transition: left 0.3s; }
            .sidebar.open { left: 0; box-shadow: 4px 0 20px rgba(0,0,0,0.3); }
            .sidebar-toggle { display: block; }
            .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 99; }
            .sidebar-overlay.show { display: block; }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="app-container">
            <!-- 左侧边栏 -->
            <div :class="['sidebar', { open: sidebarOpen }]">
                <div class="sidebar-header">
                    <h3>🕸️ 对话列表</h3>
                    <button class="new-chat-btn" @click="newChat">+ 新对话</button>
                </div>
                <div class="sidebar-list">
                    <div v-for="chat in chatList" :key="chat.id"
                         :class="['chat-item', { active: chat.id === currentChatId }]"
                         @click="switchChat(chat.id)">
                        <span class="chat-item-label">📄 {{ chat.label }}</span>
                        <button class="chat-item-delete" @click.stop="deleteChat(chat.id)">✕</button>
                    </div>
                    <div v-if="chatList.length === 0" style="padding: 20px; text-align: center; color: var(--text-sidebar-muted); font-size: 13px;">
                        暂无对话，点击上方按钮开始
                    </div>
                </div>
                <div class="sidebar-footer">
                    <a href="/">← 返回导航</a>
                </div>
            </div>
            <div :class="['sidebar-overlay', { show: sidebarOpen }]" @click="sidebarOpen = false"></div>

            <!-- 右侧主区域：上图谱 + 下对话 -->
            <div class="main-area">
                <div class="app-header">
                    <div style="display:flex;align-items:center;gap:8px;">
                        <button class="sidebar-toggle" @click="sidebarOpen = !sidebarOpen">☰</button>
                        <h3>🕸️ GraphRAG 知识图谱阅读助手</h3>
                    </div>
                    <span style="font-size:12px;color:var(--text-muted);">GraphRAG</span>
                </div>

                <div class="app-layout" style="height: calc(100vh - 52px);">
                    <!-- 左半：知识图谱 -->
                    <div class="left-panel">
                        <div class="panel-header">
                            <h3>🕸️ 知识图谱</h3>
                            <div v-if="currentGraphData" class="stat-badge">
                                {{ currentGraphData.nodes.length }} 实体 · {{ currentGraphData.edges.length }} 关系
                            </div>
                        </div>
                        <div class="graph-section">
                            <div v-if="!currentGraphData && !currentUploading" class="upload-placeholder">
                                <div class="upload-icon">🕸️</div>
                                <h3 style="margin-bottom:8px;font-weight:600;">上传 PDF 构建知识图谱</h3>
                                <p style="font-size:13px;">上传文档后自动抽取实体关系并可视化</p>
                                <div class="upload-area" @click="triggerUpload" @dragover.prevent @drop.prevent="handleDrop">
                                    <div style="font-size:28px;margin-bottom:8px;">📄</div>
                                    <p style="font-size:13px;color:var(--text-secondary);">点击或拖拽上传 PDF</p>
                                    <input type="file" ref="fileInput" accept=".pdf" style="display:none" @change="handleFileChange">
                                </div>
                            </div>
                            <div v-if="currentUploading" class="upload-placeholder">
                                <div class="uploading-spinner">⚙️</div>
                                <h3 style="margin-bottom:8px;font-weight:600;">正在解析文档...</h3>
                                <div class="uploading-steps">
                                    <div :class="{active: currentUploadStep===1, done: currentUploadStep>1}">① 上传文件</div>
                                    <div :class="{active: currentUploadStep===2, done: currentUploadStep>2}">② 文本分块与向量化</div>
                                    <div :class="{active: currentUploadStep===3, done: currentUploadStep>3}">③ LLM 实体关系抽取</div>
                                    <div :class="{active: currentUploadStep===4, done: currentUploadStep>4}">④ 知识图谱构建</div>
                                </div>
                            </div>
                            <div id="graph-chart" v-show="currentGraphData && !currentUploading"></div>
                        </div>
                    </div>

                    <!-- 右半：对话 -->
                    <div class="right-panel">
                        <div class="chat-messages" ref="chatMessages">
                            <div v-for="(msg, index) in currentMessages" :key="index"
                                 :class="['message', msg.type]">
                                <div class="message-content">
                                    <div v-if="msg.typing" class="loading">
                                        <div class="loading-dots"><span></span><span></span><span></span></div>
                                    </div>
                                    <template v-else>
                                        <div v-if="msg.streamingText" class="streaming-text">{{ msg.streamingText }}</div>
                                        <div v-else v-html="renderMarkdown(msg.content)"></div>
                                    </template>
                                </div>
                            </div>
                        </div>

                        <div class="input-area">
                            <div class="input-wrapper">
                                <input v-model="input" placeholder="输入问题，基于文档和知识图谱回答..."
                                       @keyup.enter="sendMessage" :disabled="!hasFile || loading">
                                <button class="send-btn" @click="sendMessage" :disabled="!hasFile || loading">发送</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    const { createApp, ref, computed, nextTick } = Vue;

    createApp({
        setup() {
            const input = ref('');
            const loading = ref(false);
            const fileInput = ref(null);
            const chatMessages = ref(null);
            const sidebarOpen = ref(false);
            let graphChart = null;

            const chatList = ref([]);
            const currentChatId = ref('');
            const allMessages = ref({});    // { chatId: [{type, content, typing, streamingText}] }
            const tabGraphData = ref({});   // { chatId: graphData }
            const tabHasFile = ref({});     // { chatId: boolean }
            const tabUploading = ref({});   // { chatId: boolean }
            const tabUploadStep = ref({});  // { chatId: number }

            const currentMessages = computed(() => allMessages.value[currentChatId.value] || []);
            const currentGraphData = computed(() => tabGraphData.value[currentChatId.value] || null);
            const hasFile = computed(() => tabHasFile.value[currentChatId.value] || false);
            const currentUploading = computed(() => tabUploading.value[currentChatId.value] || false);
            const currentUploadStep = computed(() => tabUploadStep.value[currentChatId.value] || 0);

            // === 持久化 ===
            const STORAGE_KEY_LIST = 'graphrag_chat_list';
            const STORAGE_KEY_MSGS = 'graphrag_chat_messages';
            const STORAGE_KEY_HAS_FILE = 'graphrag_has_file';

            const saveChats = () => {
                try {
                    const msgsCopy = {};
                    for (const [k, v] of Object.entries(allMessages.value)) {
                        msgsCopy[k] = v.map(m => {
                            if (m.type === 'ai') {
                                const { streamingText, typing, ...rest } = m;
                                return rest;
                            }
                            return m;
                        });
                    }
                    localStorage.setItem(STORAGE_KEY_LIST, JSON.stringify(chatList.value));
                    localStorage.setItem(STORAGE_KEY_MSGS, JSON.stringify(msgsCopy));
                    localStorage.setItem(STORAGE_KEY_HAS_FILE, JSON.stringify(tabHasFile.value));
                } catch (e) { console.warn('保存对话历史失败:', e); }
            };

            const loadChats = () => {
                try {
                    const saved = localStorage.getItem(STORAGE_KEY_LIST);
                    if (saved) chatList.value = JSON.parse(saved);
                    const savedMsgs = localStorage.getItem(STORAGE_KEY_MSGS);
                    if (savedMsgs) allMessages.value = JSON.parse(savedMsgs);
                    const savedHasFile = localStorage.getItem(STORAGE_KEY_HAS_FILE);
                    if (savedHasFile) tabHasFile.value = JSON.parse(savedHasFile);
                } catch (e) { console.warn('加载对话历史失败:', e); }
                fetchChatIds();
            };

            const fetchChatIds = async () => {
                try {
                    const resp = await fetch('/ai/history/pdf');
                    const serverIds = await resp.json();
                    for (const sid of serverIds) {
                        if (!chatList.value.find(c => c.id === sid)) {
                            chatList.value.push({ id: sid, label: '对话 ' + sid.substring(2, 10) });
                        }
                        // 服务端有记录的对话一定已上传文件
                        if (!tabHasFile.value[sid]) {
                            tabHasFile.value[sid] = true;
                        }
                    }
                    saveChats();

                    // 对所有有文件的对话，从服务端加载图谱数据
                    for (const chatId of Object.keys(tabHasFile.value)) {
                        if (tabHasFile.value[chatId]) {
                            loadGraphData(chatId);
                        }
                    }
                } catch (e) { console.warn('加载服务端对话ID失败:', e); }
            };

            const generateChatId = () => '2_' + Date.now() + '_' + Math.random().toString(36).substring(2, 8);

            const newChat = () => {
                const id = generateChatId();
                chatList.value.unshift({ id, label: '新对话' });
                allMessages.value[id] = [{ type: 'ai', content: '您好！我是 GraphRAG 阅读助手。上传 PDF 文档后，我会自动构建知识图谱，帮您深度理解文档内容。', typing: false }];
                currentChatId.value = id;
                sidebarOpen.value = false;
                saveChats();
            };

            const switchChat = (chatId) => {
                currentChatId.value = chatId;
                sidebarOpen.value = false;
                nextTick(() => {
                    scrollToBottom();
                    renderCurrentGraph();
                });
            };

            const deleteChat = async (chatId) => {
                chatList.value = chatList.value.filter(c => c.id !== chatId);
                delete allMessages.value[chatId];
                delete tabGraphData.value[chatId];
                delete tabHasFile.value[chatId];
                delete tabUploading.value[chatId];
                delete tabUploadStep.value[chatId];
                if (currentChatId.value === chatId) {
                    currentChatId.value = chatList.value.length > 0 ? chatList.value[0].id : '';
                }
                saveChats();
                try { await fetch(`/ai/pdf/chat/${chatId}`, { method: 'DELETE' }); } catch (e) {}
                nextTick(() => renderCurrentGraph());
            };

            // 初始化加载
            loadChats();
            if (chatList.value.length === 0) newChat();
            else if (!currentChatId.value) currentChatId.value = chatList.value[0].id;

            const renderMarkdown = (text) => {
                if (!text) return '';
                try { return marked.parse(text, { breaks: true, gfm: true }); } catch { return text; }
            };

            const scrollToBottom = () => {
                nextTick(() => {
                    if (chatMessages.value) chatMessages.value.scrollTop = chatMessages.value.scrollHeight;
                });
            };

            const triggerUpload = () => { fileInput.value.click(); };

            const handleFileChange = (event) => {
                const file = event.target.files[0];
                if (file) uploadFile(file);
                event.target.value = '';
            };

            const handleDrop = (event) => {
                const file = event.dataTransfer.files[0];
                if (file && file.type === 'application/pdf') uploadFile(file);
                else alert('只能上传 PDF 文件！');
            };

            const uploadFile = async (file) => {
                if (file.size > 30 * 1024 * 1024) {
                    alert('文件大小不能超过 30MB！');
                    return;
                }

                const chatId = currentChatId.value;
                tabUploading.value[chatId] = true;
                tabUploadStep.value[chatId] = 1;

                const stepTimer = setInterval(() => {
                    if ((tabUploadStep.value[chatId] || 0) < 4) {
                        tabUploadStep.value[chatId] = (tabUploadStep.value[chatId] || 0) + 1;
                    }
                }, 4000);

                const formData = new FormData();
                formData.append('file', file);

                try {
                    const response = await fetch(`/ai/pdf/upload/${chatId}`, { method: 'POST', body: formData });
                    const result = await response.json();

                    clearInterval(stepTimer);
                    tabUploadStep.value[chatId] = 4;

                    setTimeout(async () => {
                        tabUploading.value[chatId] = false;
                        tabUploadStep.value[chatId] = 0;

                        if (result.code === 200 || result.ok === 1 || result.success === true) {
                            tabHasFile.value[chatId] = true;
                            const chatItem = chatList.value.find(c => c.id === chatId);
                            if (chatItem) chatItem.label = file.name.replace('.pdf', '').substring(0, 12);

                            const msgs = allMessages.value[chatId];
                            if (msgs) {
                                msgs.push({ type: 'ai', content: `文件《${file.name}》上传成功！知识图谱已构建完成，您可以开始提问了。`, typing: false });
                            }
                            saveChats();
                            if (currentChatId.value === chatId) scrollToBottom();

                            await loadGraphData(chatId);
                        } else {
                            alert(result.message || result.msg || '上传失败');
                        }
                    }, 500);
                } catch (error) {
                    clearInterval(stepTimer);
                    tabUploading.value[chatId] = false;
                    tabUploadStep.value[chatId] = 0;
                    alert('上传失败，请重试');
                }
            };

            const typeColorMap = {
                Person: '#ef4444', Organization: '#3b82f6', Location: '#22c55e',
                Concept: '#a855f7', Event: '#f59e0b', Technology: '#14b8a6',
                Product: '#f97316', Time: '#6b7280', Other: '#9ca3af'
            };
            const typeLabelMap = {
                Person: '人物', Organization: '组织', Location: '地点',
                Concept: '概念', Event: '事件', Technology: '技术',
                Product: '产品', Time: '时间', Other: '其他'
            };

            const loadGraphData = async (chatId) => {
                try {
                    const response = await fetch(`/ai/graph/${chatId}`);
                    const data = await response.json();
                    // 只有存在节点数据时才更新（避免空数据覆盖）
                    if (data && data.nodes && data.nodes.length > 0) {
                        tabGraphData.value[chatId] = data;
                        if (currentChatId.value === chatId) {
                            nextTick(() => renderCurrentGraph());
                        }
                    }
                } catch (error) {
                    console.error('图谱数据加载失败:', error);
                }
            };

            const renderCurrentGraph = () => {
                const data = tabGraphData.value[currentChatId.value];
                if (!data) {
                    if (graphChart) graphChart.clear();
                    return;
                }

                const container = document.getElementById('graph-chart');
                if (!container) return;
                if (!graphChart) {
                    graphChart = echarts.init(container);
                    window.addEventListener('resize', () => graphChart && graphChart.resize());
                }

                const nodes = data.nodes.map(n => ({
                    name: n.name,
                    symbolSize: Math.max(24, Math.min(56, 24 + (data.edges.filter(e => e.source === n.name || e.target === n.name).length) * 6)),
                    itemStyle: { color: typeColorMap[n.entityType] || typeColorMap.Other },
                    label: { show: true, fontSize: 11, color: '#333' },
                    tooltip: {
                        backgroundColor: '#fff', borderColor: '#e5e5e5', textStyle: { color: '#1a1a1a', fontSize: 12 },
                        formatter: () => `<b>${n.name}</b><br/>类型: ${typeLabelMap[n.entityType] || n.entityType}<br/>${n.description || ''}`
                    }
                }));

                // 检测双向边：同一对节点间如果有两条边，给其中一条反方向弯曲避免标签重叠
                const pairCount = {};
                data.edges.forEach(e => {
                    const key = [e.source, e.target].sort().join('|||');
                    pairCount[key] = (pairCount[key] || 0) + 1;
                });
                const pairSeen = {};

                const edges = data.edges.map(e => {
                    const key = [e.source, e.target].sort().join('|||');
                    let curveness = 0.15;
                    if (pairCount[key] > 1) {
                        // 双向边：第二条反向弯曲
                        pairSeen[key] = (pairSeen[key] || 0) + 1;
                        curveness = pairSeen[key] % 2 === 1 ? 0.3 : -0.3;
                    }
                    return {
                        source: e.source,
                        target: e.target,
                        lineStyle: { color: '#bbb', width: 1.5, curveness },
                        label: { show: true, formatter: e.name, fontSize: 9, color: '#888' }
                    };
                });

                graphChart.setOption({
                    backgroundColor: '#f7f7f8',
                    tooltip: { trigger: 'item' },
                    animationDurationUpdate: 1200,
                    animationEasingUpdate: 'cubicInOut',
                    series: [{
                        type: 'graph',
                        layout: 'force',
                        data: nodes,
                        links: edges,
                        roam: true,
                        draggable: true,
                        force: { repulsion: 350, gravity: 0.08, edgeLength: [80, 200], layoutAnimation: true },
                        emphasis: { focus: 'adjacency', lineStyle: { width: 3 } },
                        edgeSymbol: ['none', 'arrow'],
                        edgeSymbolSize: [0, 7],
                        label: { position: 'bottom' }
                    }]
                }, true);
            };

            const sendMessage = async () => {
                if (!input.value.trim() || !hasFile.value) return;
                const chatId = currentChatId.value;
                const question = input.value;
                input.value = '';
                loading.value = true;

                const msgs = allMessages.value[chatId];
                msgs.push({ type: 'user', content: question, typing: false });

                // 更新对话标题
                const chatItem = chatList.value.find(c => c.id === chatId);
                if (chatItem && chatItem.label === '新对话') {
                    chatItem.label = question.substring(0, 20) + (question.length > 20 ? '...' : '');
                }

                // AI消息对象 — push后从响应式数组取回代理对象
                msgs.push({ type: 'ai', content: '', typing: true, streamingText: '' });
                const aiMsg = msgs[msgs.length - 1];
                saveChats();
                scrollToBottom();

                try {
                    const response = await fetch(`/ai/pdf/chat/stream?prompt=${encodeURIComponent(question)}&chatId=${chatId}`);
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let buffer = '';
                    let fullContent = '';

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;

                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\n');
                        buffer = lines.pop();

                        for (const line of lines) {
                            if (!line.startsWith('data:')) continue;
                            const jsonStr = line.substring(5).trim();
                            if (!jsonStr) continue;

                            try {
                                const event = JSON.parse(jsonStr);

                                if (event.type === 'done') {
                                    aiMsg.typing = false;
                                    aiMsg.content = fullContent;
                                    aiMsg.streamingText = '';
                                    saveChats();
                                    continue;
                                }

                                if (event.type === 'error') {
                                    aiMsg.typing = false;
                                    aiMsg.content = event.content || '处理出错，请重试';
                                    aiMsg.streamingText = '';
                                    saveChats();
                                    continue;
                                }

                                if (event.type === 'token') {
                                    fullContent += event.content;
                                    aiMsg.streamingText = fullContent;
                                    aiMsg.typing = false;
                                    if (currentChatId.value === chatId) scrollToBottom();
                                }
                            } catch (e) {
                                console.warn('SSE parse error:', e, jsonStr);
                            }
                        }
                    }

                    aiMsg.typing = false;
                    aiMsg.content = fullContent;
                    aiMsg.streamingText = '';
                    saveChats();
                } catch (error) {
                    aiMsg.typing = false;
                    aiMsg.content = '抱歉，处理失败，请重试。';
                    aiMsg.streamingText = '';
                    saveChats();
                } finally {
                    loading.value = false;
                    if (currentChatId.value === chatId) scrollToBottom();
                }
            };

            return {
                input, loading, fileInput, chatMessages, sidebarOpen,
                chatList, currentChatId, currentMessages,
                currentGraphData, hasFile, currentUploading, currentUploadStep,
                triggerUpload, handleFileChange, handleDrop,
                sendMessage, renderMarkdown, newChat, switchChat, deleteChat
            };
        }
    }).mount('#app');
    </script>
</body>
</html>
