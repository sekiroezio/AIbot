<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人办公助手</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f7f7f8;
            --bg-sidebar: #1a1a2e;
            --bg-sidebar-hover: #16213e;
            --bg-sidebar-active: #0f3460;
            --border: #e5e5e5;
            --text-primary: #1a1a1a;
            --text-secondary: #6b6b6b;
            --text-muted: #999999;
            --text-sidebar: #e0e0e0;
            --text-sidebar-muted: #8899aa;
            --accent: #10a37f;
            --accent-hover: #0d8c6d;
            --user-bubble: #f7f7f8;
            --shadow: 0 2px 6px rgba(0,0,0,0.06);
            --todo-in-progress: #3b82f6;
            --todo-completed: #22c55e;
            --tool-border: #60a5fa;
            --tool-result-bg: #f0fdf4;
            --tool-result-border: #4ade80;
            --tool-result-text: #166534;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif; background: var(--bg-primary); height: 100vh; overflow: hidden; color: var(--text-primary); }

        .app-container { display: flex; height: 100vh; }

        /* 左侧边栏 */
        .sidebar {
            width: 260px; min-width: 260px; background: var(--bg-sidebar);
            display: flex; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.06);
        }
        .sidebar-header {
            padding: 16px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .sidebar-header h3 { color: #fff; font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .new-chat-btn {
            background: var(--accent); color: #fff; border: none; border-radius: 8px;
            padding: 6px 12px; font-size: 13px; cursor: pointer; transition: background 0.2s;
            display: flex; align-items: center; gap: 4px;
        }
        .new-chat-btn:hover { background: var(--accent-hover); }

        .sidebar-list { flex: 1; overflow-y: auto; padding: 8px; }
        .sidebar-list::-webkit-scrollbar { width: 4px; }
        .sidebar-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

        .chat-item {
            padding: 10px 12px; border-radius: 8px; cursor: pointer;
            color: var(--text-sidebar); font-size: 13px; margin-bottom: 2px;
            display: flex; align-items: center; justify-content: space-between;
            transition: all 0.15s; position: relative;
        }
        .chat-item:hover { background: var(--bg-sidebar-hover); }
        .chat-item.active { background: var(--bg-sidebar-active); color: #fff; font-weight: 500; }
        .chat-item-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .chat-item-delete {
            opacity: 0; background: none; border: none; color: var(--text-sidebar-muted);
            cursor: pointer; font-size: 14px; padding: 2px 4px; border-radius: 4px; transition: all 0.15s;
        }
        .chat-item:hover .chat-item-delete { opacity: 1; }
        .chat-item-delete:hover { color: #ef4444; background: rgba(239,68,68,0.15); }

        .sidebar-footer { padding: 12px 16px; border-top: 1px solid rgba(255,255,255,0.08); }
        .sidebar-footer a { color: var(--text-sidebar-muted); text-decoration: none; font-size: 12px; transition: color 0.2s; }
        .sidebar-footer a:hover { color: var(--accent); }

        /* 右侧主内容 */
        .main-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }

        .app-header {
            padding: 14px 24px; background: var(--bg-primary);
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; min-height: 52px;
        }
        .app-header h3 { font-size: 15px; font-weight: 600; }

        .content-wrapper { flex: 1; display: flex; overflow: hidden; }

        .chat-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }

        .chat-messages { flex: 1; overflow-y: auto; padding: 24px; background: var(--bg-primary); }
        .chat-messages::-webkit-scrollbar { width: 6px; }
        .chat-messages::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }

        .message { margin-bottom: 20px; animation: fadeIn 0.25s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .message.user { display: flex; justify-content: flex-end; }
        .message.ai { display: flex; justify-content: flex-start; }

        .message-content {
            max-width: 85%; padding: 12px 16px; border-radius: 16px; line-height: 1.7; font-size: 14px;
            word-wrap: break-word; overflow-wrap: break-word;
        }
        .message.ai .message-content { background: var(--user-bubble); color: var(--text-primary); }
        .message.user .message-content { background: var(--accent); color: white; border-bottom-right-radius: 4px; }

        /* Markdown渲染样式 */
        .message-content table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 13px; }
        .message-content th { background: #e8f5e9; padding: 8px 12px; text-align: left; border: 1px solid #c8e6c9; font-weight: 600; white-space: nowrap; }
        .message-content td { padding: 8px 12px; border: 1px solid #e0e0e0; }
        .message-content tr:nth-child(even) td { background: #fafafa; }
        .message-content tr:hover td { background: #f0f7f0; }
        .message-content pre { background: #1e1e1e; color: #d4d4d4; padding: 14px; border-radius: 8px; overflow-x: auto; font-size: 13px; margin: 8px 0; }
        .message-content code { background: var(--bg-secondary); padding: 2px 6px; border-radius: 4px; font-family: 'Menlo', 'Consolas', monospace; font-size: 13px; }
        .message-content pre code { background: transparent; padding: 0; color: inherit; }
        .message-content p { margin: 6px 0; }
        .message-content ul, .message-content ol { padding-left: 20px; margin: 6px 0; }
        .message-content li { margin: 3px 0; }
        .message-content blockquote { border-left: 3px solid var(--accent); padding-left: 12px; margin: 8px 0; color: var(--text-secondary); }
        .message-content h1, .message-content h2, .message-content h3 { margin: 12px 0 6px; }
        .message-content a { color: var(--accent); }
        .message-content hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

        /* 思考文本（普通展示） */
        .thinking-text {
            color: var(--text-secondary); font-size: 14px; line-height: 1.7;
            white-space: pre-wrap; word-break: break-word;
        }

        /* 工具调用块 */
        .tool-block {
            margin: 8px 0; border-radius: 8px; overflow: hidden;
            border: 1px solid var(--tool-border); background: var(--tool-bg);
        }
        .tool-header {
            padding: 6px 12px; font-size: 11px; color: var(--tool-text); cursor: pointer;
            display: flex; align-items: center; gap: 6px; user-select: none; font-weight: 500;
        }
        .tool-header:hover { background: rgba(96,165,250,0.15); }
        .tool-header .arrow { transition: transform 0.2s; font-size: 10px; }
        .tool-header .arrow.collapsed { transform: rotate(-90deg); }
        .tool-body {
            padding: 8px 12px; font-size: 12px; color: var(--tool-text); line-height: 1.6;
            border-top: 1px solid var(--tool-border); white-space: pre-wrap; word-break: break-all;
        }
        .tool-body .label { font-weight: 600; color: #1e3a5f; }

        /* 工具结果块 */
        .tool-result-block {
            margin: 8px 0; border-radius: 8px; overflow: hidden;
            border: 1px solid var(--tool-result-border); background: var(--tool-result-bg);
        }
        .tool-result-header {
            padding: 6px 12px; font-size: 11px; color: var(--tool-result-text); cursor: pointer;
            display: flex; align-items: center; gap: 6px; user-select: none; font-weight: 500;
        }
        .tool-result-header:hover { background: rgba(74,222,128,0.15); }
        .tool-result-header .arrow { transition: transform 0.2s; font-size: 10px; }
        .tool-result-header .arrow.collapsed { transform: rotate(-90deg); }
        .tool-result-body {
            padding: 8px 12px; font-size: 12px; color: var(--tool-result-text); line-height: 1.6;
            border-top: 1px solid var(--tool-result-border); white-space: pre-wrap; word-break: break-all;
            max-height: 250px; overflow-y: auto;
        }

        /* ===== Todo 面板（深色标题栏 + 圆圈勾选样式）===== */
        .todo-panel {
            width: 340px; min-width: 340px; background: #ffffff;
            border-left: 1px solid var(--border); display: flex; flex-direction: column;
            transition: width 0.3s, min-width 0.3s, opacity 0.3s;
        }
        .todo-panel.collapsed { width: 0; min-width: 0; overflow: hidden; opacity: 0; }

        /* 标题栏（亮灰色） */
        .todo-panel-header {
            padding: 12px 16px; background: #f1f3f5;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        .todo-panel-header .title-row {
            display: flex; align-items: center; gap: 8px;
            color: #374151; font-size: 14px; font-weight: 500;
        }
        .todo-panel-header .title-icon { font-size: 16px; line-height: 1; }
        .todo-panel-header .title-text { letter-spacing: 0.5px; }
        .todo-progress {
            color: #6b7280; font-size: 13px; font-weight: 400;
        }

        /* 白色内容区域 */
        .todo-list {
            flex: 1; overflow-y: auto; padding: 10px 14px;
        }
        .todo-list::-webkit-scrollbar { width: 4px; }
        .todo-list::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }

        /* 单条任务 */
        .todo-item {
            display: flex; align-items: center; gap: 11px;
            padding: 9px 6px; margin-bottom: 2px;
            transition: background 0.15s; border-radius: 6px;
        }
        .todo-item:hover { background: #f5f7fa; }

        /* 圆圈图标 */
        .todo-icon {
            flex-shrink: 0; width: 20px; height: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 17px; line-height: 1;
        }
        .todo-icon.pending       { color: #94a3b8; }
        .todo-icon.in_progress  { color: #3b82f6; position: relative; }
        .todo-icon.in_progress::after {
            content: ''; width: 16px; height: 16px;
            border: 2.5px solid #bfdbfe; border-top-color: #3b82f6;
            border-radius: 50%; animation: spinRing 0.9s linear infinite;
            position: absolute;
        }
        .todo-icon.completed     {
            width: 20px; height: 20px;
            border: 2px solid #22c55e; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; line-height: 1; color: #22c55e;
            box-sizing: border-box;
        }

        @keyframes spinRing {
            to { transform: rotate(360deg); }
        }

        /* 任务文字 */
        .todo-text {
            flex: 1; font-size: 13.5px; line-height: 1.45;
            color: var(--text-primary); word-break: break-word;
        }
        .todo-item.completed .todo-text {
            text-decoration: line-through; color: #9ca3af;
        }

        /* 空状态 */
        .todo-empty {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; color: #a1a1aa; font-size: 13px; padding: 28px;
        }
        .todo-empty-icon { font-size: 32px; margin-bottom: 8px; opacity: 0.5; }

        /* 标签指示器 */
        .step-indicator {
            display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px;
            border-radius: 10px; font-size: 11px; font-weight: 500; margin-right: 6px;
        }
        .step-tool { background: #dbeafe; color: #1e40af; }
        .step-result { background: #dcfce7; color: #166534; }

        /* 流式文本（正在生成中） */
        .streaming-text {
            color: var(--text-secondary); white-space: pre-wrap; word-break: break-all;
        }

        /* 输入区域 */
        .input-area { padding: 16px 24px 24px; background: var(--bg-primary); }
        .input-wrapper {
            display: flex; align-items: center; background: var(--bg-primary);
            border: 1px solid var(--border); border-radius: 12px; overflow: hidden;
            box-shadow: var(--shadow); transition: border-color 0.2s;
        }
        .input-wrapper:focus-within { border-color: var(--accent); }
        .input-wrapper input {
            flex: 1; border: none; outline: none; padding: 14px 16px; font-size: 14px;
            background: transparent; color: var(--text-primary);
        }
        .input-wrapper input::placeholder { color: var(--text-muted); }
        .input-wrapper input:disabled { opacity: 0.5; }
        .send-btn {
            padding: 8px 16px; margin: 4px; border: none; border-radius: 8px;
            background: var(--accent); color: white; font-size: 14px; cursor: pointer;
            transition: background 0.2s; font-weight: 500;
        }
        .send-btn:hover { background: var(--accent-hover); }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .loading { text-align: center; padding: 16px; color: var(--text-muted); }
        .loading-dots { display: inline-flex; gap: 4px; }
        .loading-dots span { width: 6px; height: 6px; background: var(--text-muted); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); }
        .empty-state-icon { font-size: 56px; margin-bottom: 16px; }
        .empty-state-text { font-size: 15px; margin-bottom: 6px; }
        .empty-state-hint { font-size: 13px; }

        .header-actions { display: flex; align-items: center; gap: 8px; }
        .toggle-todo-btn {
            background: none; border: 1px solid var(--border); border-radius: 6px;
            padding: 4px 10px; font-size: 12px; cursor: pointer; color: var(--text-secondary);
            transition: all 0.2s; display: flex; align-items: center; gap: 4px;
        }
        .toggle-todo-btn:hover { border-color: var(--accent); color: var(--accent); }
        .toggle-todo-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        .sidebar-toggle {
            display: none; background: none; border: none; font-size: 20px; cursor: pointer;
            color: var(--text-primary); padding: 4px 8px;
        }
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -280px; top: 0; bottom: 0; z-index: 100; transition: left 0.3s; }
            .sidebar.open { left: 0; box-shadow: 4px 0 20px rgba(0,0,0,0.3); }
            .sidebar-toggle { display: block; }
            .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 99; }
            .sidebar-overlay.show { display: block; }
            .todo-panel { width: 0; min-width: 0; overflow: hidden; opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="app-container">
            <!-- 左侧边栏 -->
            <div :class="['sidebar', { open: sidebarOpen }]">
                <div class="sidebar-header">
                    <h3>🤖 对话列表</h3>
                    <button class="new-chat-btn" @click="newChat">+ 新对话</button>
                </div>
                <div class="sidebar-list">
                    <div v-for="chat in chatList" :key="chat.id"
                         :class="['chat-item', { active: chat.id === currentChatId }]"
                         @click="switchChat(chat.id)">
                        <span class="chat-item-label">💬 {{ chat.label }}</span>
                        <button class="chat-item-delete" @click.stop="deleteChat(chat.id)">✕</button>
                    </div>
                    <div v-if="chatList.length === 0" style="padding: 20px; text-align: center; color: var(--text-sidebar-muted); font-size: 13px;">
                        暂无对话，点击上方按钮开始
                    </div>
                </div>
                <div class="sidebar-footer">
                    <a href="/">← 返回导航</a>
                </div>
            </div>
            <div :class="['sidebar-overlay', { show: sidebarOpen }]" @click="sidebarOpen = false"></div>

            <!-- 右侧主区域 -->
            <div class="main-area">
                <div class="app-header">
                    <div style="display:flex;align-items:center;gap:8px;">
                        <button class="sidebar-toggle" @click="sidebarOpen = !sidebarOpen">☰</button>
                        <h3>🤖 个人办公助手</h3>
                    </div>
                    <div class="header-actions">
                        <button :class="['toggle-todo-btn', { active: todoPanelVisible }]" @click="todoPanelVisible = !todoPanelVisible">
                            📋 任务 {{ currentTodos.length > 0 ? '(' + completedCount + '/' + currentTodos.length + ')' : '' }}
                        </button>
                        <span style="font-size:12px;color:var(--text-muted);">ReAct Agent</span>
                    </div>
                </div>

                <div class="content-wrapper">
                    <div class="chat-area">
                        <!-- 消息列表 -->
                        <div v-if="currentMessages.length > 0" class="chat-messages" ref="chatMessages">
                            <div v-for="(msg, index) in currentMessages" :key="index" :class="['message', msg.role]">
                                <div class="message-content">
                                    <template v-if="msg.role === 'user'">
                                        {{ msg.content }}
                                    </template>
                                    <template v-else>
                                        <template v-for="(part, pi) in msg.parts" :key="pi">
                                            <!-- 思考（普通文本展示） -->
                                            <div v-if="part.type === 'thinking'" class="thinking-text">{{ part.content }}</div>
                                            <!-- 工具调用 -->
                                            <div v-else-if="part.type === 'tool_call'" class="tool-block">
                                                <div class="tool-header" @click="part.collapsed = !part.collapsed">
                                                    <span :class="['arrow', {collapsed: part.collapsed}]">▼</span>
                                                    <span class="step-indicator step-tool">🔧 调用</span>
                                                    <span>{{ part.toolName }}</span>
                                                </div>
                                                <div v-show="!part.collapsed" class="tool-body">
                                                    <div v-if="part.toolArgs"><span class="label">参数:</span> {{ part.toolArgs }}</div>
                                                </div>
                                            </div>
                                            <!-- 工具结果 -->
                                            <div v-else-if="part.type === 'tool_result'" class="tool-result-block">
                                                <div class="tool-result-header" @click="part.collapsed = !part.collapsed">
                                                    <span :class="['arrow', {collapsed: part.collapsed}]">▼</span>
                                                    <span class="step-indicator step-result">📋 结果</span>
                                                    <span>{{ part.toolName }}</span>
                                                </div>
                                                <div v-show="!part.collapsed" class="tool-result-body">{{ part.content }}</div>
                                            </div>
                                            <!-- 最终回答（渲染Markdown） -->
                                            <div v-else-if="part.type === 'answer'" v-html="renderMarkdown(part.content)"></div>
                                        </template>
                                        <!-- 流式文本缓冲 -->
                                        <div v-if="msg.streamingText" class="streaming-text">{{ msg.streamingText }}</div>
                                        <div v-if="msg.loading" class="loading">
                                            <div class="loading-dots"><span></span><span></span><span></span></div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>

                        <!-- 空状态 -->
                        <div v-else class="empty-state">
                            <div class="empty-state-icon">🤖</div>
                            <div class="empty-state-text">您好！我是您的个人办公助手</div>
                            <div class="empty-state-hint">我可以帮您执行命令、编辑文件、管理任务等</div>
                        </div>

                        <!-- 输入区域 -->
                        <div class="input-area">
                            <div class="input-wrapper">
                                <input v-model="input" placeholder="输入指令，如：帮我开发一个贪吃蛇小游戏..."
                                       @keyup.enter="sendMessage" :disabled="loading">
                                <button class="send-btn" @click="sendMessage" :disabled="loading || !input.trim()">发送</button>
                            </div>
                        </div>
                    </div>

                    <!-- Todo 侧边面板 -->
                    <div :class="['todo-panel', { collapsed: !todoPanelVisible }]">
                        <!-- 深色标题栏 -->
                        <div class="todo-panel-header">
                            <div class="title-row">
                                <span class="title-icon">☰</span>
                                <span class="title-text">任务清单</span>
                            </div>
                            <span class="todo-progress" v-if="currentTodos.length > 0">
                                {{ completedCount }}/{{ currentTodos.length }} 已完成
                            </span>
                            <span class="todo-progress" v-else>0/0 已完成</span>
                        </div>
                        <!-- 任务列表（白色背景） -->
                        <div class="todo-list" v-if="currentTodos.length > 0">
                            <div v-for="(todo, idx) in currentTodos" :key="idx + '_' + (todo.status || '') + '_' + (todo.content || '')"
                                 :class="['todo-item', todo.status]">
                                <span :class="['todo-icon', normalizeStatus(todo.status)]">
                                    <template v-if="normalizeStatus(todo.status) === 'completed'">✓</template>
                                    <template v-else-if="normalizeStatus(todo.status) === 'in_progress'"></template>
                                    <template v-else>○</template>
                                </span>
                                <span class="todo-text">{{ todo.content }}</span>
                            </div>
                        </div>
                        <div v-else class="todo-empty">
                            <div class="todo-empty-icon">📋</div>
                            <div>暂无任务</div>
                            <div style="margin-top:4px;font-size:12px;color:#b0b8c4;">复杂任务会自动创建计划</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    const { createApp, ref, computed, nextTick, watch } = Vue;

    createApp({
        setup() {
            const input = ref('');
            const loading = ref(false);
            const chatMessages = ref(null);
            const sidebarOpen = ref(false);
            const todoPanelVisible = ref(true);

            const chatList = ref([]);
            const currentChatId = ref('');
            const allMessages = ref({});
            const allTodos = ref({}); // chatId -> todos[]

            const currentMessages = computed(() => {
                return allMessages.value[currentChatId.value] || [];
            });

            const currentTodos = computed(() => {
                const list = allTodos.value[currentChatId.value] || [];
                return Array.isArray(list) ? list : [];
            });

            // 标准化 status 值，兼容各种可能的格式
            const normalizeStatus = (status) => {
                if (!status) return 'pending';
                const s = String(status).toLowerCase().trim();
                if (s === 'completed' || s === 'done' || s === 'finish' || s === 'finished') return 'completed';
                if (s === 'in_progress' || s === 'inprogress' || s === 'running' || s === 'doing' || s === 'active') return 'in_progress';
                return 'pending';
            };

            const completedCount = computed(() => {
                return currentTodos.value.filter(t => normalizeStatus(t.status) === 'completed').length;
            });

            const progressPercent = computed(() => {
                if (currentTodos.value.length === 0) return 0;
                return Math.round(completedCount.value / currentTodos.value.length * 100);
            });

            const loadChats = () => {
                try {
                    const saved = localStorage.getItem('office_chat_list');
                    if (saved) chatList.value = JSON.parse(saved);
                    const savedMsgs = localStorage.getItem('office_chat_messages');
                    if (savedMsgs) allMessages.value = JSON.parse(savedMsgs);
                    const savedTodos = localStorage.getItem('office_chat_todos');
                    if (savedTodos) allTodos.value = JSON.parse(savedTodos);
                } catch (e) { console.warn('加载对话历史失败:', e); }
                fetchChatIds();
            };

            const fetchChatIds = async () => {
                try {
                    const resp = await fetch('/ai/history/service');
                    const serverIds = await resp.json();
                    for (const sid of serverIds) {
                        if (!chatList.value.find(c => c.id === sid)) {
                            chatList.value.push({ id: sid, label: '对话 ' + sid.substring(2, 10) });
                        }
                    }
                    saveChats();
                } catch (e) { console.warn('加载服务端对话ID失败:', e); }
            };

            const saveChats = () => {
                try {
                    const msgsCopy = {};
                    for (const [k, v] of Object.entries(allMessages.value)) {
                        msgsCopy[k] = v.map(m => {
                            if (m.role === 'ai') {
                                const { streamingText, ...rest } = m;
                                return rest;
                            }
                            return m;
                        });
                    }
                    localStorage.setItem('office_chat_list', JSON.stringify(chatList.value));
                    localStorage.setItem('office_chat_messages', JSON.stringify(msgsCopy));
                    localStorage.setItem('office_chat_todos', JSON.stringify(allTodos.value));
                } catch (e) { console.warn('保存对话历史失败:', e); }
            };

            const updateTodosFromToolArgs = (toolArgs) => {
                try {
                    let parsed;
                    if (typeof toolArgs === 'string') {
                        // 处理 pretty-printed JSON 或可能带转义的 JSON
                        parsed = JSON.parse(toolArgs);
                    } else {
                        parsed = toolArgs;
                    }
                    if (parsed.todos && Array.isArray(parsed.todos)) {
                        // 深拷贝数组确保新引用，同时标准化每个 todo 的 status
                        const normalizedTodos = parsed.todos.map(t => ({
                            content: t.content || '',
                            status: normalizeStatus(t.status)
                        }));
                        // 用全新数组替换，确保 Vue 响应式触发
                        const newAllTodos = { ...allTodos.value };
                        newAllTodos[currentChatId.value] = normalizedTodos;
                        allTodos.value = newAllTodos;
                        if (normalizedTodos.length > 0) {
                            todoPanelVisible.value = true;
                        }
                        saveChats();
                        console.log('[Todo] 更新成功:', normalizedTodos.map(t => t.status + ':' + t.content.substring(0, 20)));
                    }
                } catch (e) {
                    console.warn('[Todo] 解析失败, raw:', typeof toolArgs === 'string' ? toolArgs.substring(0, 200) : toolArgs, e);
                }
            };

            // 从 tool_result 内容中尝试提取 todo 信息（兜底方案）
            const updateTodosFromResultContent = (content, toolName) => {
                if (!content || toolName !== 'write_todos') return;
                // 工具返回格式类似: "Updated todo list to [Todo{...}, ...]"
                // 尝试匹配 todos 数组模式
                try {
                    // 如果 content 是 JSON 字符串
                    const trimmed = String(content).trim();
                    if (trimmed.startsWith('{') || trimmed.startsWith('[')) {
                        const parsed = JSON.parse(trimmed);
                        if (Array.isArray(parsed)) {
                            updateTodosFromToolArgs({ todos: parsed });
                            return;
                        }
                    }
                } catch (e) { /* 不是JSON，忽略 */ }
            };

            const newChat = () => {
                const id = '1_' + Date.now() + '_' + Math.random().toString(36).substring(2, 8);
                chatList.value.unshift({ id, label: '新对话' });
                allMessages.value[id] = [
                    {
                        role: 'ai',
                        parts: [{ type: 'answer', content: '您好！我是您的个人办公助手 🤖\n\n我可以帮您：\n- 📁 管理文件（读取、编辑、写入、搜索）\n- 💻 执行 Shell 命令\n- 📋 管理任务计划\n- 🔧 更多办公自动化操作\n\n试试对我说："帮我开发一个贪吃蛇小游戏" 或 "查看当前目录结构"' }],
                        loading: false
                    }
                ];
                currentChatId.value = id;
                sidebarOpen.value = false;
                saveChats();
            };

            const switchChat = (chatId) => {
                currentChatId.value = chatId;
                sidebarOpen.value = false;
                nextTick(scrollToBottom);
            };

            const deleteChat = async (chatId) => {
                chatList.value = chatList.value.filter(c => c.id !== chatId);
                const newMsgs = { ...allMessages.value };
                delete newMsgs[chatId];
                allMessages.value = newMsgs;
                const newTodos = { ...allTodos.value };
                delete newTodos[chatId];
                allTodos.value = newTodos;
                if (currentChatId.value === chatId) {
                    currentChatId.value = chatList.value.length > 0 ? chatList.value[0].id : '';
                }
                saveChats();
                try { await fetch(`/ai/service/chat/${chatId}`, { method: 'DELETE' }); } catch (e) {}
            };

            const renderMarkdown = (text) => {
                if (!text) return '';
                try { return marked.parse(text, { breaks: true, gfm: true }); } catch { return text; }
            };

            const scrollToBottom = () => {
                nextTick(() => {
                    if (chatMessages.value) chatMessages.value.scrollTop = chatMessages.value.scrollHeight;
                });
            };

            const sendMessage = async () => {
                if (!input.value.trim() || loading.value) return;
                if (!currentChatId.value) newChat();

                const question = input.value;
                input.value = '';
                loading.value = true;

                const msgs = allMessages.value[currentChatId.value];
                msgs.push({ role: 'user', content: question });

                const chatItem = chatList.value.find(c => c.id === currentChatId.value);
                if (chatItem && chatItem.label === '新对话') {
                    chatItem.label = question.substring(0, 20) + (question.length > 20 ? '...' : '');
                }

                msgs.push({ role: 'ai', parts: [], streamingText: '', loading: true });
                const aiMsg = msgs[msgs.length - 1];
                saveChats();
                scrollToBottom();

                try {
                    const response = await fetch(`/ai/service/stream?prompt=${encodeURIComponent(question)}&chatId=${currentChatId.value}`);
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let buffer = '';

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;

                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\n');
                        buffer = lines.pop();

                        for (const line of lines) {
                            if (!line.startsWith('data:')) continue;
                            const jsonStr = line.substring(5).trim();
                            if (!jsonStr) continue;

                            try {
                                const event = JSON.parse(jsonStr);

                                if (event.type === 'done') {
                                    aiMsg.loading = false;
                                    aiMsg.streamingText = '';
                                    saveChats();
                                    continue;
                                }

                                if (event.type === 'error') {
                                    aiMsg.parts.push({ type: 'answer', content: event.content });
                                    aiMsg.loading = false;
                                    aiMsg.streamingText = '';
                                    saveChats();
                                    continue;
                                }

                                if (event.type === 'token') {
                                    aiMsg.streamingText = (aiMsg.streamingText || '') + event.content;
                                    scrollToBottom();
                                    continue;
                                }

                                aiMsg.streamingText = '';

                                if (event.type === 'thinking') {
                                    aiMsg.parts.push({
                                        type: 'thinking',
                                        content: event.content
                                    });
                                } else if (event.type === 'tool_call') {
                                    const part = {
                                        type: 'tool_call',
                                        id: event.id || '',
                                        toolName: event.toolName || '',
                                        toolArgs: event.toolArgs || '',
                                        collapsed: true
                                    };
                                    aiMsg.parts.push(part);

                                    // 解析 write_todos 工具调用，更新 Todo 面板
                                    if (event.toolName === 'write_todos' && event.toolArgs) {
                                        updateTodosFromToolArgs(event.toolArgs);
                                    }
                                } else if (event.type === 'tool_result') {
                                    const resultId = event.id || '';
                                    const resultToolName = event.toolName || '';

                                    // 兜底：从 write_todos 的工具结果中也尝试提取 todo
                                    updateTodosFromResultContent(event.content, resultToolName);

                                    let inserted = false;
                                    if (resultId) {
                                        for (let i = aiMsg.parts.length - 1; i >= 0; i--) {
                                            if (aiMsg.parts[i].type === 'tool_call' && aiMsg.parts[i].id === resultId) {
                                                aiMsg.parts.splice(i + 1, 0, {
                                                    type: 'tool_result',
                                                    id: resultId,
                                                    toolName: event.toolName || '',
                                                    content: event.content || '',
                                                    collapsed: true
                                                });
                                                inserted = true;
                                                break;
                                            }
                                        }
                                    }
                                    if (!inserted) {
                                        aiMsg.parts.push({
                                            type: 'tool_result',
                                            id: resultId,
                                            toolName: event.toolName || '',
                                            content: event.content || '',
                                            collapsed: true
                                        });
                                    }
                                } else if (event.type === 'answer') {
                                    aiMsg.streamingText = '';
                                    const lastPart = aiMsg.parts[aiMsg.parts.length - 1];
                                    if (lastPart && lastPart.type === 'answer') {
                                        lastPart.content += event.content;
                                    } else {
                                        aiMsg.parts.push({ type: 'answer', content: event.content });
                                    }
                                }

                                scrollToBottom();
                            } catch (e) {
                                console.warn('SSE parse error:', e, jsonStr);
                            }
                        }
                    }

                    aiMsg.loading = false;
                    aiMsg.streamingText = '';
                    saveChats();
                } catch (error) {
                    aiMsg.parts.push({ type: 'answer', content: '抱歉，处理失败，请重试。' });
                    aiMsg.loading = false;
                    aiMsg.streamingText = '';
                    saveChats();
                } finally {
                    loading.value = false;
                    scrollToBottom();
                }
            };

            loadChats();
            if (chatList.value.length === 0) newChat();
            else if (!currentChatId.value) currentChatId.value = chatList.value[0].id;

            return {
                input, loading, chatMessages, sidebarOpen, todoPanelVisible,
                chatList, currentChatId, currentMessages, currentTodos,
                completedCount, progressPercent, normalizeStatus,
                renderMarkdown, sendMessage, newChat, switchChat, deleteChat
            };
        }
    }).mount('#app');
    </script>
</body>
</html>
