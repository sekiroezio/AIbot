<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能图书馆</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            padding: 30px 0;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 18px;
            opacity: 0.9;
        }

        .tabs-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .module-content {
            padding: 30px;
            min-height: 500px;
        }

        .upload-area {
            border: 2px dashed #dcdfe6;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .upload-area:hover {
            border-color: #409EFF;
            background-color: #f5f7fa;
        }

        .chat-container {
            border: 1px solid #e4e7ed;
            border-radius: 8px;
            overflow: hidden;
        }

        .chat-messages {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background-color: #f5f7fa;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 8px;
            line-height: 1.5;
        }

        .message.ai {
            background-color: white;
            border: 1px solid #e4e7ed;
        }

        .message.user-message {
            background-color: #409EFF;
            color: white;
        }

        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e4e7ed;
        }

        .file-info {
            background: #ecf5ff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .service-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .service-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .service-card:hover {
            transform: translateY(-5px);
        }

        .service-card h3 {
            margin-bottom: 10px;
            font-size: 18px;
        }

        .service-card p {
            font-size: 14px;
            opacity: 0.9;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #909399;
        }

        /* Markdown 表格样式 */
        .message-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
            overflow: hidden;
            border-radius: 8px;
        }

        .message-content th,
        .message-content td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e4e7ed;
        }

        .message-content th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: bold;
        }

        .message-content tr:hover {
            background-color: #f5f7fa;
        }

        .message-content p {
            margin: 8px 0;
        }

        .message-content pre {
            background-color: #f6f8fa;
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 8px 0;
        }

        .message-content code {
            background-color: #f6f8fa;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
        }

        .message-content pre code {
            background-color: transparent;
            padding: 0;
        }

        .message-content ul,
        .message-content ol {
            padding-left: 20px;
            margin: 8px 0;
        }

        .message-content li {
            margin: 4px 0;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="container">
            <div class="header">
                <h1>📚 智能图书馆</h1>
                <p>AI 驱动的智能阅读与图书服务助手</p>
            </div>

            <div class="tabs-container">
                <el-tabs v-model="activeTab" type="border-card">
                    <!-- 阅读助手模块 -->
                    <el-tab-pane label="📖 阅读助手" name="reading">
                        <div class="module-content">
                            <div class="upload-area" @click="triggerUpload" @dragover.prevent @drop.prevent="handleDrop">
                                <div style="font-size: 48px; margin-bottom: 10px;">⬆️</div>
                                <p style="margin-top: 10px; color: #909399;">
                                    点击或拖拽上传 PDF 文件（最大 30MB）
                                </p>
                                <input 
                                    type="file" 
                                    ref="fileInput" 
                                    accept=".pdf" 
                                    style="display: none"
                                    @change="handleFileChange"
                                >
                            </div>

                            <!-- 上传进度条 -->
                            <div v-if="isUploading" style="padding: 20px; background: #f5f7fa; border-radius: 8px; margin-bottom: 20px;">
                                <el-progress 
                                    :percentage="uploadProgress" 
                                    :stroke-width="8"
                                    :text-inside="true"
                                    status="active"
                                    color="#409EFF"
                                >
                                </el-progress>
                                <p style="text-align: center; margin-top: 10px; color: #909399; font-size: 13px;">
                                    <span style="display: inline-block; animation: spin 1s linear infinite; margin-right: 5px;">🔄</span>
                                    正在上传和解析中... {{ formatProgress() }}%
                                </p>
                                <p style="text-align: center; color: #909399; font-size: 12px; margin-top: 5px;">
                                    文件较大时可能需要一些时间，请耐心等待...
                                </p>
                            </div>

                            <div v-if="currentFile && !isUploading" class="file-info">
                                <div>
                                    <span style="font-size: 20px; margin-right: 8px;">📄</span>
                                    <strong>{{ currentFile ? currentFile.name : '' }}</strong>
                                </div>
                                <div style="display: flex; gap: 10px;">
                                    <el-button type="primary" size="small" @click="previewPDF">
                                        👁️ 预览
                                    </el-button>
                                    <el-button type="danger" size="small" @click="removeFile">
                                        ❌ 移除
                                    </el-button>
                                </div>
                            </div>

                            <!-- PDF 预览对话框 -->
                            <el-dialog v-model="previewVisible" title="PDF 预览" width="80%" top="5vh">
                                <iframe 
                                    :src="pdfPreviewUrl" 
                                    width="100%" 
                                    height="600px" 
                                    frameborder="0"
                                    style="border-radius: 8px;"
                                ></iframe>
                            </el-dialog>

                            <div class="chat-container">
                                <div class="chat-messages" ref="chatMessages">
                                    <div v-for="(msg, index) in readingMessages" :key="index" 
                                         :class="['message', msg.type === 'user' ? 'user' : 'ai']">
                                        <div :class="['message-content', msg.type === 'user' ? 'user-message' : '']">
                                            <div v-html="renderMarkdown(msg.content)"></div>
                                        </div>
                                    </div>
                                    <div v-if="readingLoading" class="loading">
                                        <span style="display: inline-block; animation: spin 1s linear infinite; font-size: 20px;">⏳</span>
                                        <span>思考中...</span>
                                    </div>
                                </div>

                                <div class="input-area">
                                    <el-input
                                        v-model="readingInput"
                                        placeholder="请输入关于 PDF 内容的问题..."
                                        @keyup.enter="sendReadingMessage"
                                        :disabled="!currentFile || readingLoading"
                                        clearable
                                    >
                                        <template #append>
                                            <el-button @click="sendReadingMessage" 
                                                       :disabled="!currentFile || readingLoading"
                                                       type="primary">
                                                💬 发送
                                            </el-button>
                                        </template>
                                    </el-input>
                                </div>
                            </div>
                        </div>
                    </el-tab-pane>

                    <!-- 图书预约助手模块 -->
                    <el-tab-pane label="📋 图书预约助手" name="reservation">
                        <div class="module-content">
                            <div class="service-grid">
                                <div class="service-card" @click="quickQuestion('如何预约图书？')">
                                    <h3>📝 图书预约流程</h3>
                                    <p>了解如何预约心仪的图书</p>
                                </div>
                                <div class="service-card" @click="quickQuestion('预约后多久可以取书？')">
                                    <h3>⏰ 取书时间</h3>
                                    <p>查询预约图书的取书时间</p>
                                </div>
                                <div class="service-card" @click="quickQuestion('可以预约多少本书？')">
                                    <h3>📚 预约数量限制</h3>
                                    <p>了解预约数量规定</p>
                                </div>
                                <div class="service-card" @click="quickQuestion('如何取消预约？')">
                                    <h3>❌ 取消预约</h3>
                                    <p>学习如何取消已有预约</p>
                                </div>
                            </div>

                            <div class="chat-container">
                                <div class="chat-messages" ref="reservationChat">
                                    <div v-for="(msg, index) in reservationMessages" :key="index" 
                                         :class="['message', msg.type === 'user' ? 'user' : 'ai']">
                                        <div :class="['message-content', msg.type === 'user' ? 'user-message' : '']">
                                            <div v-html="renderMarkdown(msg.content)"></div>
                                        </div>
                                    </div>
                                    <div v-if="reservationLoading" class="loading">
                                        <span style="display: inline-block; animation: spin 1s linear infinite; font-size: 20px;">⏳</span>
                                        <span>思考中...</span>
                                    </div>
                                </div>

                                <div class="input-area">
                                    <el-input
                                        v-model="reservationInput"
                                        placeholder="请输入关于图书预约的问题..."
                                        @keyup.enter="sendReservationMessage"
                                        :disabled="reservationLoading"
                                        clearable
                                    >
                                        <template #append>
                                            <el-button @click="sendReservationMessage" 
                                                       :disabled="reservationLoading"
                                                       type="primary">
                                                💬 发送
                                            </el-button>
                                        </template>
                                    </el-input>
                                </div>
                            </div>
                        </div>
                    </el-tab-pane>
                </el-tabs>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, nextTick } = Vue;

        createApp({
            setup() {
                console.log('=== Vue 应用初始化 ===');
                
                const activeTab = ref('reading');
                const readingInput = ref('');
                const reservationInput = ref('');
                const readingMessages = ref([
                    { type: 'ai', content: '您好！我是您的智能阅读助手。请上传 PDF 文件，然后我可以帮您分析文档内容、解答疑问。' }
                ]);
                const reservationMessages = ref([
                    { type: 'ai', content: '您好！我是图书预约助手。我可以帮您了解图书预约流程、查询预约状态等。请问有什么可以帮您？' }
                ]);
                const readingLoading = ref(false);
                const reservationLoading = ref(false);
                const uploadProgress = ref(0);
                const isUploading = ref(false);
                const currentFile = ref(null);
                const previewVisible = ref(false);
                const pdfPreviewUrl = ref('');
                const chatId = ref('chat_' + Date.now());
                const fileInput = ref(null);

                console.log('初始状态:');
                console.log('- currentFile:', currentFile.value);
                console.log('- isUploading:', isUploading.value);
                console.log('- uploadProgress:', uploadProgress.value);

                // 格式化进度百分比
                const formatProgress = () => {
                    return Math.round(uploadProgress.value);
                };

                const triggerUpload = () => {
                    fileInput.value.click();
                };

                // Markdown 渲染函数
                const renderMarkdown = (text) => {
                    if (!text) return '';
                    try {
                        return marked.parse(text);
                    } catch (error) {
                        console.error('Markdown 解析失败:', error);
                        return text;
                    }
                };

                const handleFileChange = (event) => {
                    const file = event.target.files[0];
                    if (file) {
                        uploadFile(file);
                    }
                };

                const handleDrop = (event) => {
                    const file = event.dataTransfer.files[0];
                    if (file && file.type === 'application/pdf') {
                        uploadFile(file);
                    } else {
                        ElementPlus.ElMessage.error('只能上传 PDF 文件！');
                    }
                };

                const uploadFile = async (file) => {
                    console.log('=== 开始上传 ===');
                    console.log('文件对象:', file);
                    console.log('文件名:', file.name);
                    
                    if (file.size > 30 * 1024 * 1024) {
                        ElementPlus.ElMessage.error('文件大小不能超过 30MB！');
                        return;
                    }

                    // 设置上传状态
                    isUploading.value = true;
                    uploadProgress.value = 0;
                    console.log('isUploading:', isUploading.value);
                    console.log('uploadProgress:', uploadProgress.value);

                    const formData = new FormData();
                    formData.append('file', file);

                    try {
                        // 模拟进度更新（因为实际上传是异步的）
                        const progressInterval = setInterval(() => {
                            if (uploadProgress.value < 90) {
                                uploadProgress.value += Math.random() * 15;
                                if (uploadProgress.value > 90) {
                                    uploadProgress.value = 90;
                                }
                            }
                        }, 300);

                        const response = await fetch(`/ai/pdf/upload/${chatId.value}`, {
                            method: 'POST',
                            body: formData
                        });

                        clearInterval(progressInterval);
                        uploadProgress.value = 100;

                        const result = await response.json();
                        
                        // 等待进度条完成动画
                        await new Promise(resolve => setTimeout(resolve, 500));
                        
                        // 修改判断条件：兼容多种响应格式
                        if (result.code === 200 || result.ok === 1 || result.success === true) {
                            currentFile.value = file;
                            isUploading.value = false;
                            
                            console.log('上传成功!');
                            console.log('currentFile:', currentFile.value);
                            console.log('isUploading:', isUploading.value);
                            
                            // 设置 PDF 预览 URL
                            pdfPreviewUrl.value = `/ai/pdf/file/${chatId.value}`;
                            
                            readingMessages.value.push({
                                type: 'ai',
                                content: `文件《${file.name}》上传成功！您现在可以开始提问了，也可以点击"预览"按钮查看 PDF 原文。`
                            });
                            ElementPlus.ElMessage.success('文件上传成功');
                        } else {
                            isUploading.value = false;
                            ElementPlus.ElMessage.error(result.message || result.msg || '上传失败');
                        }
                    } catch (error) {
                        console.error('上传失败:', error);
                        isUploading.value = false;
                        ElementPlus.ElMessage.error('上传失败，请重试');
                    }
                };

                const removeFile = () => {
                    currentFile.value = null;
                    previewVisible.value = false;
                    pdfPreviewUrl.value = '';
                    chatId.value = 'chat_' + Date.now();
                    readingMessages.value = [
                        { type: 'ai', content: '文件已移除，请重新上传新的 PDF 文件。' }
                    ];
                };

                // 预览 PDF
                const previewPDF = () => {
                    if (currentFile.value) {
                        previewVisible.value = true;
                    }
                };

                const scrollToBottom = (refName) => {
                    nextTick(() => {
                        const container = document.querySelector(refName);
                        if (container) {
                            container.scrollTop = container.scrollHeight;
                        }
                    });
                };

                const sendReadingMessage = async () => {
                    if (!readingInput.value.trim() || !currentFile.value) return;

                    const question = readingInput.value;
                    readingMessages.value.push({ type: 'user', content: question });
                    readingLoading.value = true;
                    readingInput.value = '';
                    scrollToBottom('.chat-messages');

                    try {
                        const response = await fetch(
                            `/ai/pdf/chat?prompt=${encodeURIComponent(question)}&chatId=${chatId.value}`
                        );
                        const answer = await response.text();
                        
                        readingMessages.value.push({ type: 'ai', content: answer });
                    } catch (error) {
                        console.error('提问失败:', error);
                        readingMessages.value.push({ 
                            type: 'ai', 
                            content: '抱歉，处理您的问题失败，请重试。' 
                        });
                    } finally {
                        readingLoading.value = false;
                        scrollToBottom('.chat-messages');
                    }
                };

                const sendReservationMessage = async () => {
                    if (!reservationInput.value.trim()) return;

                    const question = reservationInput.value;
                    reservationMessages.value.push({ type: 'user', content: question });
                    reservationLoading.value = true;
                    reservationInput.value = '';
                    scrollToBottom('.reservation-chat');

                    try {
                        const response = await fetch(
                            `/ai/service?prompt=${encodeURIComponent(question)}&chatId=${chatId.value}`
                        );
                        const answer = await response.text();
                        
                        reservationMessages.value.push({ type: 'ai', content: answer });
                    } catch (error) {
                        console.error('提问失败:', error);
                        reservationMessages.value.push({ 
                            type: 'ai', 
                            content: '抱歉，处理您的问题失败，请重试。' 
                        });
                    } finally {
                        reservationLoading.value = false;
                        scrollToBottom('.reservation-chat');
                    }
                };

                const quickQuestion = (question) => {
                    reservationInput.value = question;
                    sendReservationMessage();
                };

                return {
                    activeTab,
                    readingInput,
                    reservationInput,
                    readingMessages,
                    reservationMessages,
                    readingLoading,
                    reservationLoading,
                    currentFile,
                    fileInput,
                    previewVisible,
                    pdfPreviewUrl,
                    formatProgress,
                    renderMarkdown,
                    triggerUpload,
                    handleFileChange,
                    handleDrop,
                    removeFile,
                    previewPDF,
                    sendReadingMessage,
                    sendReservationMessage,
                    quickQuestion
                };
            }
        }).use(ElementPlus).mount('#app');
    </script>
</body>
</html>
