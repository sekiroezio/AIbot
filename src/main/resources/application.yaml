aibot:
  chat-model-type: cloud
  graph:
    entity-vector-index-name: entity_embeddings
    entity-vector-dimension: 1024
    search-top-k: 2
    search-similarity-threshold: 0.5
    traversal-depth: 2
    traversal-limit: 10
  relation-type-mapping:
    CREATED_BY: "创造,创作,写,著,发明,创立"
    BELONGS_TO: "属于,归"
    LOCATED_IN: "位于,坐落"
    PART_OF: "包含,组成,部分"
    STUDIES_AT: "学习,就读"
    TEACHES: "教导,教,指导"
    MANAGES: "管理,领导"
    WORKS_FOR: "工作,任职"
    PARTICIPATES_IN: "参与,参加"
    HELPS: "帮助,帮"
    OPPOSES: "反对,对抗"
    FRIEND_OF: "朋友"
    FAMILY_OF: "家人"
    SPOUSE_OF: "夫妻,配偶"
    TEACHER_OF: "师生,老师"
    HAPPENED_AT: "发生,爆发"
    INFLUENCED_BY: "影响"
    RELATED_TO: "相关"

spring:
  application:
    name: AIbot
  neo4j:
    uri: neo4j://localhost:7687
    authentication:
      username: neo4j
      password: 12345678
  ai:
    mcp:
      client:
        enabled: true
        type: SYNC
        initialized: true
        sse:
          connections:
            book-query-mcp-server:
              url: http://localhost:8848/sse
        stdio:
          connections:
            tavily:
              command: cmd.exe
              args: ["/c", "npx", "-y", "tavily-mcp@latest"]
              env:
                TAVILY_API_KEY: ${TAVILY_API_KEY}
    vectorstore:
      neo4j:
        initialize-schema: true
        database-name: neo4j
        index-name: custom-index
        embedding-dimension: 1024
        distance-type: cosine
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
    openai:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/
      api-key: ${DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen3.6-plus
          temperature: 0.7
      embedding:
        options:
          model: text-embedding-v3
          dimensions: 1024
    ollama:
      base-url: http://localhost:11434
      chat:
        model: qwen3.5:9b
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/aibot?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 1234
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: 243345
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s
  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 40MB
  jackson:
    default-property-inclusion: non_null
logging:
  level:
    org.springframework.ai: debug
    org.springframework.data.neo4j: debug
    com.xdu.aibot: debug
    org.neo4j.driver: debug
    com.baomidou.mybatisplus: debug
    org.mybatis: debug
